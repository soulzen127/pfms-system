// ============ Three.js 3D Scene (Full Interactive) ============
const ThreeScene=({selectedAsset,onAssetClick,siteData,onLabelPositions})=>{
  const mountRef=useRef(null);
  const stateRef=useRef({camera:null,scene:null,renderer:null,meshes:[],animId:null,isDragging:false,prevMouse:{x:0,y:0},spherical:{theta:0,phi:Math.PI/4,radius:40},target:new THREE.Vector3(0,3,0),autoRotate:true});

  useEffect(()=>{
    if(!mountRef.current)return;
    const el=mountRef.current;
    const S=stateRef.current;
    const w=el.clientWidth,h=el.clientHeight;

    const scene=new THREE.Scene();
    scene.background=new THREE.Color(0x0a1628);
    scene.fog=new THREE.FogExp2(0x0a1628,0.006);
    S.scene=scene;

    const camera=new THREE.PerspectiveCamera(55,w/h,0.1,1000);
    S.camera=camera;

    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(w,h);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
    renderer.shadowMap.enabled=true;renderer.shadowMap.type=THREE.PCFSoftShadowMap;
    el.appendChild(renderer.domElement);
    S.renderer=renderer;

    // Lights
    scene.add(new THREE.AmbientLight(0x334466,0.6));
    const dl=new THREE.DirectionalLight(0xffeedd,1.0);dl.position.set(20,30,10);dl.castShadow=true;scene.add(dl);
    scene.add(Object.assign(new THREE.PointLight(0x3b82f6,1.5,60),{position:new THREE.Vector3(-10,15,-10)}));
    scene.add(Object.assign(new THREE.PointLight(0x06b6d4,1.0,50),{position:new THREE.Vector3(15,10,15)}));

    // Ground + Grid
    const ground=new THREE.Mesh(new THREE.PlaneGeometry(100,100),new THREE.MeshStandardMaterial({color:0x0d1f3c,roughness:0.9}));
    ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
    scene.add(Object.assign(new THREE.GridHelper(80,40,0x1e3a5f,0x162d50),{position:new THREE.Vector3(0,0.01,0)}));

    // Building
    const bldg=new THREE.Mesh(new THREE.BoxGeometry(18,10,14),new THREE.MeshPhysicalMaterial({color:0x1e3a5f,metalness:0.3,roughness:0.6,clearcoat:0.2}));
    bldg.position.set(0,5,0);bldg.castShadow=true;scene.add(bldg);
    for(let i=1;i<=3;i++){const fl=new THREE.Mesh(new THREE.BoxGeometry(18.1,0.05,14.1),new THREE.MeshBasicMaterial({color:0x3b82f6,transparent:true,opacity:0.4}));fl.position.set(0,i*3,0);scene.add(fl);}
    [-4,4].forEach(x=>{const ru=new THREE.Mesh(new THREE.BoxGeometry(4,2,3),new THREE.MeshPhysicalMaterial({color:0x334155,metalness:0.5,roughness:0.4}));ru.position.set(x,11,0);ru.castShadow=true;scene.add(ru);});

    // Assets
    const allAssets=[];
    if(siteData?.floors)siteData.floors.forEach(f=>f.zones?.forEach(z=>z.assets?.forEach(a=>allAssets.push(a))));
    const mats={active:new THREE.MeshPhysicalMaterial({color:0x10b981,metalness:0.6,roughness:0.3,emissive:0x064e3b,emissiveIntensity:0.2}),warning:new THREE.MeshPhysicalMaterial({color:0xf59e0b,metalness:0.6,roughness:0.3,emissive:0x78350f,emissiveIntensity:0.3}),maintenance:new THREE.MeshPhysicalMaterial({color:0x6366f1,metalness:0.6,roughness:0.3,emissive:0x312e81,emissiveIntensity:0.2})};
    const rackGeo=new THREE.BoxGeometry(1.2,3.5,0.8);
    const meshes=[];
    const positions=[[-5,2,-3],[-3,2,-3],[-1,2,-3],[1,2,-3],[3,2,-3],[5,2,-3],[-5,2,0],[-3,2,0],[-1,2,0],[1,2,0],[3,2,0],[5,2,0],[-5,2,3],[-3,2,3],[-1,2,3],[1,2,3],[3,2,3],[5,2,3],[-5,5.5,-3],[-3,5.5,-3],[-1,5.5,-3],[1,5.5,-3],[-5,5.5,0],[-3,5.5,0],[-1,5.5,0],[1,5.5,0]];
    positions.forEach((pos,i)=>{
      const asset=allAssets[i%allAssets.length];
      const st=asset?.status||"active";
      const rack=new THREE.Mesh(rackGeo,mats[st]||mats.active);
      rack.position.set(...pos);rack.castShadow=true;
      rack.userData={id:asset?.id||`r${i}`,name:asset?.name||`Rack-${i}`,type:asset?.type||"Rack",status:st,assetData:asset};
      scene.add(rack);meshes.push(rack);
    });
    S.meshes=meshes;

    // LEDs
    meshes.forEach(rack=>{
      const c=rack.userData.status==="warning"?0xf59e0b:0x10b981;
      for(let j=0;j<3;j++){const led=new THREE.Mesh(new THREE.SphereGeometry(0.08,8,8),new THREE.MeshBasicMaterial({color:c}));led.position.copy(rack.position);led.position.x+=0.65;led.position.y+=0.5+j*0.8;scene.add(led);}
    });
    // Network lines
    const lineMat=new THREE.LineBasicMaterial({color:0x3b82f6,transparent:true,opacity:0.15});
    for(let i=0;i<meshes.length-1;i++){if(Math.random()>0.5){const pts=[meshes[i].position.clone(),meshes[i+1].position.clone()];pts[0].y+=2;pts[1].y+=2;scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat));}}
    // Surrounding
    [[-18,2.5,-8],[20,2.5,5],[-15,2.5,12],[22,2.5,-10]].forEach(pos=>{const sb=new THREE.Mesh(new THREE.BoxGeometry(6,5,5),new THREE.MeshPhysicalMaterial({color:0x162d50,metalness:0.2,roughness:0.7}));sb.position.set(...pos);sb.castShadow=true;scene.add(sb);});
    // Particles
    const pCount=150;const pGeo=new THREE.BufferGeometry();const pPos=new Float32Array(pCount*3);
    for(let i=0;i<pCount;i++){pPos[i*3]=(Math.random()-0.5)*80;pPos[i*3+1]=Math.random()*30+2;pPos[i*3+2]=(Math.random()-0.5)*80;}
    pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
    const particles=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x3b82f6,size:0.15,transparent:true,opacity:0.4}));
    scene.add(particles);

    // --- Camera orbit system ---
    const updateCamera=()=>{
      const sp=S.spherical;
      camera.position.x=S.target.x+sp.radius*Math.sin(sp.phi)*Math.cos(sp.theta);
      camera.position.y=S.target.y+sp.radius*Math.cos(sp.phi);
      camera.position.z=S.target.z+sp.radius*Math.sin(sp.phi)*Math.sin(sp.theta);
      camera.lookAt(S.target);
    };
    updateCamera();

    // Mouse controls
    const onMouseDown=(e)=>{S.isDragging=true;S.prevMouse={x:e.clientX,y:e.clientY};S.autoRotate=false;};
    const onMouseMove=(e)=>{
      if(!S.isDragging)return;
      const dx=e.clientX-S.prevMouse.x,dy=e.clientY-S.prevMouse.y;
      if(e.buttons===1){// Left: rotate
        S.spherical.theta-=dx*0.005;
        S.spherical.phi=Math.max(0.2,Math.min(Math.PI/2-0.05,S.spherical.phi-dy*0.005));
      }else if(e.buttons===2||e.buttons===4){// Right/Middle: pan
        const right=new THREE.Vector3();const up=new THREE.Vector3();
        camera.getWorldDirection(up);
        right.crossVectors(up,camera.up).normalize();
        up.copy(camera.up).normalize();
        S.target.add(right.multiplyScalar(-dx*0.05));
        S.target.add(up.multiplyScalar(dy*0.05));
      }
      S.prevMouse={x:e.clientX,y:e.clientY};
      updateCamera();
    };
    const onMouseUp=()=>{S.isDragging=false;};
    const onWheel=(e)=>{
      e.preventDefault();
      S.spherical.radius=Math.max(8,Math.min(80,S.spherical.radius+e.deltaY*0.04));
      S.autoRotate=false;
      updateCamera();
    };
    const onDblClick=(e)=>{
      // Double click: zoom to clicked point
      const rect=el.getBoundingClientRect();
      const mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
      const raycaster=new THREE.Raycaster();
      raycaster.setFromCamera(mouse,camera);
      const hits=raycaster.intersectObjects(meshes);
      if(hits.length>0){
        const pt=hits[0].point;
        S.target.set(pt.x,pt.y,pt.z);
        S.spherical.radius=Math.max(8,S.spherical.radius*0.5);
        updateCamera();
        onAssetClick?.(hits[0].object.userData);
      } else {
        // Zoom in toward mouse direction
        S.spherical.radius=Math.max(8,S.spherical.radius*0.7);
        updateCamera();
      }
    };
    const onClick=(e)=>{
      const rect=el.getBoundingClientRect();
      const mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
      const raycaster=new THREE.Raycaster();
      raycaster.setFromCamera(mouse,camera);
      const hits=raycaster.intersectObjects(meshes);
      if(hits.length>0)onAssetClick?.(hits[0].object.userData);
    };
    const onContext=(e)=>e.preventDefault();

    el.addEventListener("mousedown",onMouseDown);el.addEventListener("mousemove",onMouseMove);
    el.addEventListener("mouseup",onMouseUp);el.addEventListener("wheel",onWheel,{passive:false});
    el.addEventListener("dblclick",onDblClick);el.addEventListener("click",onClick);
    el.addEventListener("contextmenu",onContext);

    // Touch controls
    let touchStart=null,touchDist=null;
    const onTouchStart=(e)=>{
      if(e.touches.length===1){S.isDragging=true;S.prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};S.autoRotate=false;}
      if(e.touches.length===2){const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;touchDist=Math.sqrt(dx*dx+dy*dy);}
    };
    const onTouchMove=(e)=>{
      e.preventDefault();
      if(e.touches.length===1&&S.isDragging){
        const dx=e.touches[0].clientX-S.prevMouse.x,dy=e.touches[0].clientY-S.prevMouse.y;
        S.spherical.theta-=dx*0.005;S.spherical.phi=Math.max(0.2,Math.min(Math.PI/2-0.05,S.spherical.phi-dy*0.005));
        S.prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};updateCamera();
      }
      if(e.touches.length===2&&touchDist){
        const dx=e.touches[0].clientX-e.touches[1].clientX;const dy=e.touches[0].clientY-e.touches[1].clientY;
        const newDist=Math.sqrt(dx*dx+dy*dy);
        S.spherical.radius=Math.max(8,Math.min(80,S.spherical.radius*(touchDist/newDist)));
        touchDist=newDist;updateCamera();
      }
    };
    const onTouchEnd=()=>{S.isDragging=false;touchDist=null;};
    el.addEventListener("touchstart",onTouchStart,{passive:false});
    el.addEventListener("touchmove",onTouchMove,{passive:false});
    el.addEventListener("touchend",onTouchEnd);

    // Animate
    let t=0;
    const animate=()=>{
      S.animId=requestAnimationFrame(animate);t+=0.01;
      if(S.autoRotate){S.spherical.theta+=0.002;updateCamera();}
      const pp=particles.geometry.attributes.position.array;
      for(let i=0;i<pCount;i++){pp[i*3+1]+=0.02;if(pp[i*3+1]>35)pp[i*3+1]=2;}
      particles.geometry.attributes.position.needsUpdate=true;
      meshes.forEach(m=>{m.scale.setScalar(selectedAsset&&m.userData.id===selectedAsset.id?1.0+0.1*Math.sin(t*4):1.0);});
      renderer.render(scene,camera);

      // Project labels to screen
      if(onLabelPositions){
        const labels=[];
        meshes.forEach(m=>{
          const pos=m.position.clone();pos.y+=2.2;
          const projected=pos.project(camera);
          const x=(projected.x*0.5+0.5)*w;
          const y=(-projected.y*0.5+0.5)*h;
          if(projected.z<1)labels.push({id:m.userData.id,name:m.userData.name,status:m.userData.status,x,y,data:m.userData});
        });
        onLabelPositions(labels);
      }
    };
    animate();

    const onResize=()=>{const nw=el.clientWidth,nh=el.clientHeight;camera.aspect=nw/nh;camera.updateProjectionMatrix();renderer.setSize(nw,nh);};
    window.addEventListener("resize",onResize);

    return()=>{
      cancelAnimationFrame(S.animId);
      el.removeEventListener("mousedown",onMouseDown);el.removeEventListener("mousemove",onMouseMove);
      el.removeEventListener("mouseup",onMouseUp);el.removeEventListener("wheel",onWheel);
      el.removeEventListener("dblclick",onDblClick);el.removeEventListener("click",onClick);
      el.removeEventListener("contextmenu",onContext);
      el.removeEventListener("touchstart",onTouchStart);el.removeEventListener("touchmove",onTouchMove);el.removeEventListener("touchend",onTouchEnd);
      window.removeEventListener("resize",onResize);
      if(renderer.domElement.parentNode)el.removeChild(renderer.domElement);renderer.dispose();
    };
  },[siteData]);

  return <div ref={mountRef} className="three-canvas" style={{width:"100%",height:"100%"}}/>;
};

// ============ Layer Tree ============
const LayerTree=({data,selectedId,onSelect,sq})=>{
  const[exp,setExp]=useState({s1:true,f2:true});
  const toggle=(id)=>setExp(p=>({...p,[id]:!p[id]}));
  const match=(n)=>!sq||n.toLowerCase().includes(sq.toLowerCase());
  const renderA=(a,d=4)=>{
    if(!match(a.name)&&!match(a.type||""))return null;
    return(<div key={a.id} onClick={()=>onSelect(a)} className={`flex items-center gap-2 py-1.5 px-2 rounded cursor-pointer text-sm transition-all ${selectedId===a.id?"bg-blue-900 bg-opacity-40 text-blue-300":"text-gray-400 hover:bg-white hover:bg-opacity-5 hover:text-gray-200"}`} style={{paddingLeft:d*16}}>
      <Dot s={a.status}/><span className="truncate flex-1">{a.name}</span><span className="text-xs text-gray-600">{a.type}</span>
    </div>);
  };
  return(<div className="text-sm">{data.map(site=>(
    <div key={site.id}>
      <div onClick={()=>{toggle(site.id);onSelect(site);}} className={`flex items-center gap-2 py-2 px-2 rounded cursor-pointer font-medium transition-all ${selectedId===site.id?"bg-blue-900 bg-opacity-40 text-blue-300":"text-gray-200 hover:bg-white hover:bg-opacity-5"}`}>
        {exp[site.id]?<I.ChevDown size={14}/>:<I.ChevRight size={14}/>}<I.Building size={14} className="text-blue-400"/><span className="truncate flex-1">{site.name}</span>{site.alerts>0&&<Badge variant="danger">{site.alerts}</Badge>}
      </div>
      {exp[site.id]&&site.floors?.map(fl=>(
        <div key={fl.id}>
          <div onClick={()=>{toggle(fl.id);onSelect(fl);}} className={`flex items-center gap-2 py-1.5 px-2 rounded cursor-pointer transition-all ${selectedId===fl.id?"bg-blue-900 bg-opacity-40 text-blue-300":"text-gray-300 hover:bg-white hover:bg-opacity-5"}`} style={{paddingLeft:24}}>
            {exp[fl.id]?<I.ChevDown size={12}/>:<I.ChevRight size={12}/>}<I.Layers size={12} className="text-blue-400"/><span className="truncate">{fl.name}</span>
          </div>
          {exp[fl.id]&&fl.zones?.map(z=>(
            <div key={z.id}>
              <div className="flex items-center gap-2 py-1 px-2 text-gray-500 text-xs" style={{paddingLeft:40}}><I.MapPin size={10} className="text-gray-600"/><span>{z.name}</span></div>
              {z.assets?.map(a=>(<React.Fragment key={a.id}>{renderA(a)}{a.subItems?.map(sub=>renderA(sub,5))}</React.Fragment>))}
            </div>
          ))}
        </div>
      ))}
    </div>
  ))}</div>);
};

// ============ GIS Search ============
const GISSearch=({sites,onSelect,onClose})=>{
  const[q,setQ]=useState("");
  const all=useMemo(()=>{const items=[];sites.forEach(s=>{items.push({...s,_t:"site",_p:s.name});s.floors?.forEach(f=>{items.push({...f,_t:"floor",_p:`${s.name} › ${f.name}`});f.zones?.forEach(z=>{items.push({...z,_t:"zone",_p:`${s.name} › ${f.name} › ${z.name}`});z.assets?.forEach(a=>{items.push({...a,_t:"asset",_p:`${s.name} › ... › ${a.name}`});a.subItems?.forEach(sub=>items.push({...sub,_t:"sub",_p:`... › ${a.name} › ${sub.name}`}));});});});});return items;},[sites]);
  const results=q.length>0?all.filter(it=>it.name?.toLowerCase().includes(q.toLowerCase())||it.type?.toLowerCase().includes(q.toLowerCase())||(it.model||"").toLowerCase().includes(q.toLowerCase())||(it.address||"").toLowerCase().includes(q.toLowerCase())).slice(0,10):[];
  return(
    <div className="absolute top-4 left-4 right-4 z-20" style={{maxWidth:480}}>
      <div className="rounded-xl overflow-hidden shadow-2xl" style={{background:"rgba(15,23,42,0.95)",backdropFilter:"blur(20px)",border:"1px solid rgba(71,85,105,0.4)"}}>
        <div className="flex items-center gap-3 px-4 py-3" style={{borderBottom:"1px solid rgba(71,85,105,0.3)"}}>
          <I.Search size={16} className="text-gray-400"/>
          <input autoFocus value={q} onChange={e=>setQ(e.target.value)} placeholder="搜尋設備、位置、型號..." className="flex-1 bg-transparent text-white text-sm outline-none"/>
          <button onClick={onClose} className="text-gray-400 hover:text-white"><I.X size={16}/></button>
        </div>
        {results.length>0&&<div style={{maxHeight:280,overflowY:"auto"}}>{results.map((it,i)=>(
          <button key={i} onClick={()=>{onSelect(it);onClose();}} className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-white hover:bg-opacity-5 transition-colors text-left">
            <I.Server size={15} className="text-blue-400 flex-shrink-0"/><div className="min-w-0 flex-1"><div className="text-sm text-white truncate">{it.name}</div><div className="text-xs text-gray-500 truncate">{it._p}</div></div>{it.status&&<Dot s={it.status}/>}
          </button>
        ))}</div>}
        {q&&results.length===0&&<div className="px-4 py-6 text-center text-gray-500 text-sm">未找到相關結果</div>}
      </div>
    </div>
  );
};

// ============ GIS Module ============

        </div>
        <div className="flex-1 overflow-y-auto p-2"><LayerTree data={SITES} selectedId={sel?.id} onSelect={handleClick} sq={layerSearch}/></div>
        <div className="p-3" style={{borderTop:"1px solid rgba(71,85,105,0.3)"}}><button className="w-full py-2 text-blue-400 text-xs rounded-lg flex items-center justify-center gap-2" style={{background:"rgba(37,99,235,0.1)",border:"1px solid rgba(37,99,235,0.3)"}}><I.Plus size={14}/> 新增管理據點</button></div>

          <div className="flex rounded-lg overflow-hidden" style={{background:"rgba(30,41,59,0.8)",border:"1px solid rgba(71,85,105,0.4)"}}>
            {[{k:"3d",l:"3D View"},{k:"cesium",l:"Cesium"},{k:"mapbox",l:"Mapbox"}].map(p=>(
              <button key={p.k} onClick={()=>setMapProv(p.k)} className={`px-3 py-2 text-xs transition-colors ${mapProv===p.k?"bg-blue-600 text-white":"text-gray-300 hover:bg-gray-700"}`}>{p.l}</button>
            ))}
          </div>
        </div>

        {/* Interaction hint */}
        {mapProv==="3d"&&<div className="absolute bottom-4 left-4 z-10 flex items-center gap-2 flex-wrap">
          <div className="px-3 py-1.5 rounded-lg text-xs" style={{background:"rgba(30,41,59,0.8)",border:"1px solid rgba(71,85,105,0.4)"}}>

            <span className="text-gray-500 mx-2">|</span>
            <span className="text-gray-400">右鍵拖曳</span><span className="text-white ml-1">平移</span>

            <span className="text-gray-500 mx-2">|</span>
            <span className="text-gray-400">雙擊</span><span className="text-white ml-1">聚焦</span>

            <span className="text-xs text-gray-400">MAP: </span><span className="text-xs text-white uppercase font-mono">{mapProv}</span>

        {mapProv==="3d"&&<div className="absolute right-4 top-1/2 transform -translate-y-1/2 z-10 flex flex-col gap-1">

        {showSearch&&<GISSearch sites={SITES} onSelect={handleClick} onClose={()=>setShowSearch(false)}/>}

      </div>

      {showInfo&&sel&&<AssetPanel asset={sel} onClose={()=>{setShowInfo(false);setSel(null);}}/>}
    </div>
  );
};

              <div className={`w-1 h-8 rounded-full flex-shrink-0 ${wo.priority==="urgent"?"bg-red-500":wo.priority==="high"?"bg-yellow-500":wo.priority==="normal"?"bg-blue-500":"bg-gray-300"}`}/>
              <div className="flex-1 min-w-0"><div className="text-sm text-gray-800 font-medium truncate">{wo.title}</div><div className="text-xs text-gray-500 mt-0.5">{wo.number} · {wo.asset}</div></div>
              <Badge variant={wo.status==="completed"?"success":wo.status==="in-progress"?"info":"warning"}>{wo.status==="completed"?"已完成":wo.status==="in-progress"?"處理中":"待處理"}</Badge>
              <span className="text-xs text-gray-400 hidden sm:block">{wo.assignee}</span>
              <I.ChevRight size={14} className="text-gray-300"/>
            </div>
          ))}
        </div>
        <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
          <div className="px-5 py-4 border-b border-gray-100"><h3 className="text-sm font-semibold text-gray-900">據點狀態</h3></div>
          <div className="p-4 space-y-3">
            {SITES.map(site=>(
              <div key={site.id} onClick={()=>setDetail({type:"site",data:site})} className="p-3 bg-gray-50 rounded-lg hover-lift cursor-pointer">
                <div className="flex items-center justify-between mb-1"><span className="text-sm font-medium text-gray-800">{site.name}</span><I.ChevRight size={14} className="text-gray-300"/></div>
                <div className="flex items-center justify-between text-xs text-gray-500"><span>{site.assets} 資產</span><div className="flex items-center gap-1"><Dot s={site.alerts>0?"warning":"active"}/><span>{site.alerts} 告警</span></div></div>
              </div>
            ))}
          </div>
        </div>
      </div>
      {renderDetail()}
    </div>
  );
};

// ============ Patrol Module ============
const PatrolModule=()=>{
  const[scanning,setScanning]=useState(false);
  const[scanResult,setScanResult]=useState(null);
  const[detail,setDetail]=useState(null);

  return(
    <div className="p-4 md:p-6 space-y-6 max-w-screen-xl mx-auto fade-in">
      <div className="flex items-center justify-between"><div><h2 className="text-xl font-bold text-gray-900">巡邏檢查</h2></div><button className="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 flex items-center gap-2"><I.Plus size={16}/> 新增排程</button></div>
      <div className="rounded-xl p-6 text-white" style={{background:"linear-gradient(135deg,#2563eb,#4338ca)"}}>
        <div className="flex flex-col sm:flex-row items-center gap-6">
          <div className="flex-1"><h3 className="text-lg font-semibold mb-1">QR Code 掃描巡檢</h3><p className="text-blue-200 text-sm">掃描檢查點QR碼以開始巡檢作業</p>
            {scanResult&&<div className="mt-3 rounded-lg p-3" style={{background:"rgba(255,255,255,0.1)"}}><div className="flex items-center gap-2"><I.Check size={16} className="text-green-300"/><span className="text-sm">掃描成功: {scanResult}</span></div></div>}
          </div>
          <button onClick={()=>{setScanning(true);setTimeout(()=>{setScanning(false);setScanResult("CP-B1F-003 Rack-C08");},2000);}} disabled={scanning}
            className={`w-24 h-24 rounded-2xl flex flex-col items-center justify-center gap-1 flex-shrink-0 ${scanning?"bg-white bg-opacity-30":"bg-white bg-opacity-20 hover:bg-opacity-30 cursor-pointer"}`}>
            {scanning?<I.Refresh size={28} className="spin"/>:<I.QrCode size={28}/>}<span className="text-xs">{scanning?"掃描中":"掃描"}</span>
          </button>
        </div>
      </div>
      <div className="bg-white rounded-xl border border-gray-200 overflow-hidden">
        <div className="px-5 py-4 border-b border-gray-100 flex items-center justify-between"><h3 className="text-sm font-semibold text-gray-900">今日巡檢排程</h3></div>
        {PATROLS.map(p=>(
          <div key={p.id} onClick={()=>setDetail(p)} className="px-5 py-4 flex items-center gap-4 hover:bg-gray-50 transition-colors border-b border-gray-50 cursor-pointer">
            <div className={`w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 ${p.status==="completed"?"bg-green-50 text-green-600":p.status==="in-progress"?"bg-blue-50 text-blue-600":"bg-gray-50 text-gray-400"}`}>
              {p.status==="completed"?<I.Check size={18}/>:p.status==="in-progress"?<I.Play size={18}/>:<I.Clock size={18}/>}
            </div>
            <div className="flex-1 min-w-0"><div className="text-sm font-medium text-gray-800">{p.name}</div><div className="text-xs text-gray-500 mt-0.5">{p.route} · {p.patrol}</div></div>
            <div className="text-right hidden sm:block"><div className="text-xs text-gray-400">{p.time}</div><div className="text-xs font-medium text-gray-600 mt-0.5">{p.completed}/{p.checkpoints}</div></div>
            <div style={{width:80}}><div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={`h-full rounded-full ${p.status==="completed"?"bg-green-500":"bg-blue-500"}`} style={{width:`${(p.completed/p.checkpoints)*100}%`}}/></div></div>
            <I.ChevRight size={14} className="text-gray-300"/>
          </div>
        ))}
      </div>
      {detail&&<DetailModal title={detail.name} onClose={()=>setDetail(null)}>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div><div className="text-xs text-gray-500 mb-1">路線</div><div className="text-sm">{detail.route}</div></div>
            <div><div className="text-xs text-gray-500 mb-1">巡檢人員</div><div className="text-sm">{detail.patrol}</div></div>
            <div><div className="text-xs text-gray-500 mb-1">時段</div><div className="text-sm">{detail.time}</div></div>
            <div><div className="text-xs text-gray-500 mb-1">進度</div><div className="text-sm font-bold">{detail.completed}/{detail.checkpoints} 檢查點</div></div>
          </div>
          <div className="bg-gray-50 rounded-lg p-3"><div className="flex justify-between mb-1"><span className="text-xs text-gray-500">完成進度</span><span className="text-xs font-bold">{Math.round((detail.completed/detail.checkpoints)*100)}%</span></div>
            <div className="h-2.5 bg-gray-200 rounded-full overflow-hidden"><div className={`h-full rounded-full ${detail.status==="completed"?"bg-green-500":"bg-blue-500"}`} style={{width:`${(detail.completed/detail.checkpoints)*100}%`}}/></div>
          </div>
          {detail.items.length>0&&<div><div className="text-xs text-gray-500 mb-2">檢查項目結果</div>{detail.items.map((it,i)=>(
            <div key={i} className="flex items-center justify-between py-2 border-b border-gray-50">
              <span className="text-sm text-gray-700">{it.name}</span>
              <div className="flex items-center gap-2"><span className="text-sm font-mono text-gray-600">{it.val}</span><Badge variant={it.result==="正常"?"success":"warning"}>{it.result}</Badge></div>
            </div>
          ))}</div>}
        </div>
      </DetailModal>}
    </div>
  );
};

// ============ Maintenance Module ============
const MaintenanceModule=()=>{
  const[detail,setDetail]=useState(null);
  const groups={pending:WO.filter(w=>w.status==="pending"),"in-progress":WO.filter(w=>w.status==="in-progress"),completed:WO.filter(w=>w.status==="completed")};
  const prioC={urgent:"border-red-500",high:"border-yellow-500",normal:"border-blue-500",low:"border-gray-300"};
  return(
    <div className="p-4 md:p-6 space-y-6 max-w-screen-xl mx-auto fade-in">
      <div className="flex items-center justify-between"><div><h2 className="text-xl font-bold text-gray-900">維護查修</h2></div><button className="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 flex items-center gap-2"><I.Plus size={16}/> 新增工單</button></div>
      <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
        {[{key:"pending",label:"待處理",color:"text-yellow-600",bg:"bg-yellow-50"},{key:"in-progress",label:"處理中",color:"text-blue-600",bg:"bg-blue-50"},{key:"completed",label:"已完成",color:"text-green-600",bg:"bg-green-50"}].map(col=>(
          <div key={col.key} className="bg-gray-50 rounded-xl p-4">
            <div className="flex items-center gap-2 mb-4"><span className={`text-sm font-semibold ${col.color}`}>{col.label}</span><span className={`text-xs px-2 py-0.5 rounded-full ${col.bg} ${col.color}`}>{groups[col.key]?.length||0}</span></div>
            <div className="space-y-3">{groups[col.key]?.map(wo=>(
              <div key={wo.id} onClick={()=>setDetail(wo)} className={`bg-white rounded-lg p-4 border-l-4 ${prioC[wo.priority]} shadow-sm hover-lift cursor-pointer`}>
                <div className="text-sm font-medium text-gray-800 mb-1">{wo.title}</div><div className="text-xs text-gray-500 mb-2">{wo.number}</div>
                <div className="flex items-center justify-between"><Badge variant={wo.priority==="urgent"?"danger":wo.priority==="high"?"warning":"default"}>{wo.priority==="urgent"?"緊急":wo.priority==="high"?"高":"一般"}</Badge><span className="text-xs text-gray-400">{wo.assignee}</span></div>
              </div>
            ))}{(!groups[col.key]||groups[col.key].length===0)&&<div className="text-center py-6 text-gray-400 text-sm">暫無工單</div>}</div>
          </div>
        ))}
      </div>
      {detail&&<DetailModal title={detail.title} onClose={()=>setDetail(null)}>
        <div className="space-y-4">
          <div className="grid grid-cols-2 gap-4">
            <div><div className="text-xs text-gray-500 mb-1">工單編號</div><div className="text-sm font-mono font-bold">{detail.number}</div></div>
            <div><div className="text-xs text-gray-500 mb-1">優先級</div><Badge variant={detail.priority==="urgent"?"danger":detail.priority==="high"?"warning":"primary"}>{detail.priority}</Badge></div>
            <div><div className="text-xs text-gray-500 mb-1">指派人員</div><div className="text-sm">{detail.assignee}</div></div>
            <div><div className="text-xs text-gray-500 mb-1">期限</div><div className="text-sm">{detail.due}</div></div>
          </div>
          <div><div className="text-xs text-gray-500 mb-1">問題描述</div><div className="text-sm text-gray-700 bg-gray-50 rounded-lg p-3">{detail.desc}</div></div>
          <div><div className="text-xs text-gray-500 mb-2">處理歷程</div>{detail.history.map((h,i)=>(<div key={i} className="flex items-start gap-3 mb-1.5"><div className="w-8 text-xs text-gray-400 pt-0.5 text-right flex-shrink-0">{h.time}</div><div className="w-2 h-2 rounded-full bg-blue-500 mt-1.5 flex-shrink-0"/><div className="text-sm text-gray-700">{h.action}</div></div>))}</div>
        </div>
      </DetailModal>}
    </div>
  );
};

// ============ Asset Module ============
const AssetModule=()=>{
  const[view,setView]=useState("grid");const[sq,setSq]=useState("");
  const allA=useMemo(()=>{const items=[];SITES.forEach(s=>s.floors?.forEach(f=>f.zones?.forEach(z=>z.assets?.forEach(a=>items.push({...a,site:s.name,floor:f.name,zone:z.name})))));return items;},[]);
  const filtered=sq?allA.filter(a=>a.name.toLowerCase().includes(sq.toLowerCase())||a.type.toLowerCase().includes(sq.toLowerCase())||(a.model||"").toLowerCase().includes(sq.toLowerCase())):allA;
  return(
    <div className="p-4 md:p-6 space-y-6 max-w-screen-xl mx-auto fade-in">
      <div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"><div><h2 className="text-xl font-bold text-gray-900">資產管理</h2></div>
        <div className="flex items-center gap-2"><button className="px-3 py-2 bg-white border border-gray-200 text-gray-600 text-sm rounded-lg hover:bg-gray-50 flex items-center gap-1.5"><I.Scan size={14}/> 掃描入庫</button><button className="px-3 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 flex items-center gap-1.5"><I.Plus size={14}/> 新增資產</button></div>
      </div>
      <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{[{label:"資產總數",value:allA.length,Ic:I.Database,color:"text-blue-500"},{label:"正常運行",value:allA.filter(a=>a.status==="active").length,Ic:I.Check,color:"text-green-500"},{label:"維護中",value:allA.filter(a=>a.status==="maintenance").length,Ic:I.Wrench,color:"text-yellow-500"},{label:"異常",value:allA.filter(a=>a.status==="warning").length,Ic:I.Alert,color:"text-red-500"}].map((s,i)=>(<div key={i} className="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-3"><s.Ic size={20} className={s.color}/><div><div className="text-xl font-bold text-gray-900">{s.value}</div><div className="text-xs text-gray-500">{s.label}</div></div></div>))}</div>
      <div className="flex items-center gap-3">
        <div className="flex-1 relative"><I.Search size={16} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"/><input value={sq} onChange={e=>setSq(e.target.value)} placeholder="搜尋資產名稱、類型、型號..." className="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 text-sm outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100"/></div>
        <div className="flex bg-white border border-gray-200 rounded-lg overflow-hidden"><button onClick={()=>setView("grid")} className={`p-2.5 ${view==="grid"?"bg-blue-50 text-blue-600":"text-gray-400"}`}><I.Grid size={16}/></button><button onClick={()=>setView("list")} className={`p-2.5 ${view==="list"?"bg-blue-50 text-blue-600":"text-gray-400"}`}><I.List size={16}/></button></div>
      </div>
      {view==="grid"?<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">{filtered.map(a=>(<div key={a.id} className="bg-white rounded-xl border border-gray-200 p-4 hover-lift cursor-pointer">
        <div className="flex items-center justify-between mb-3"><div className="flex items-center gap-2"><div className={`p-2 rounded-lg ${a.status==="active"?"bg-green-50":a.status==="warning"?"bg-yellow-50":"bg-purple-50"}`}><I.Server size={16} className={a.status==="active"?"text-green-500":a.status==="warning"?"text-yellow-500":"text-purple-500"}/></div><div><div className="text-sm font-semibold text-gray-800">{a.name}</div><div className="text-xs text-gray-400">{a.type}</div></div></div><Dot s={a.status}/></div>
        {a.model&&<div className="text-xs text-gray-500 mb-2">{a.model}</div>}<div className="flex items-center justify-between text-xs text-gray-400"><span>{a.site}</span><span>{a.zone}</span></div>
        {a.temp>0&&<div className="mt-3 flex items-center gap-4 text-xs"><span className="flex items-center gap-1"><I.Thermo size={12} className="text-blue-500"/>{a.temp}°C</span><span className="flex items-center gap-1"><I.Zap size={12} className="text-blue-500"/>{a.power}%</span></div>}
      </div>))}</div>:
      <div className="bg-white rounded-xl border border-gray-200 overflow-x-auto"><table className="w-full"><thead className="bg-gray-50 text-xs text-gray-500"><tr><th className="px-4 py-3 text-left">名稱</th><th className="px-4 py-3 text-left hidden md:table-cell">類型</th><th className="px-4 py-3 text-left hidden lg:table-cell">型號</th><th className="px-4 py-3 text-left hidden sm:table-cell">位置</th><th className="px-4 py-3 text-left">狀態</th></tr></thead><tbody>{filtered.map(a=>(<tr key={a.id} className="hover:bg-gray-50 cursor-pointer border-b border-gray-50"><td className="px-4 py-3 text-sm font-medium text-gray-800">{a.name}</td><td className="px-4 py-3 text-sm text-gray-500 hidden md:table-cell">{a.type}</td><td className="px-4 py-3 text-xs text-gray-400 hidden lg:table-cell">{a.model}</td><td className="px-4 py-3 text-xs text-gray-400 hidden sm:table-cell">{a.zone}</td><td className="px-4 py-3"><Badge variant={a.status==="active"?"success":a.status==="warning"?"warning":"info"}>{a.status}</Badge></td></tr>))}</tbody></table></div>}
    </div>
  );
};

// ============ Reports Module ============
const ReportsModule=()=>(<div className="p-4 md:p-6 space-y-6 max-w-screen-xl mx-auto fade-in"><div><h2 className="text-xl font-bold text-gray-900">報表分析</h2></div><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">{[{title:"資產盤點報告",desc:"最近盤點準確率 98.7%",Ic:I.Clipboard,value:"98.7%",color:"text-green-500"},{title:"維護成本分析",desc:"本月維護支出 NT$1,240,000",Ic:I.TrendUp,value:"NT$1.24M",color:"text-blue-500"},{title:"能源效率報告",desc:"PUE值持續優化中",Ic:I.Zap,value:"1.42",color:"text-yellow-500"},{title:"設備可靠性",desc:"MTBF / MTTR 趨勢分析",Ic:I.Activity,value:"99.1%",color:"text-purple-500"},{title:"巡檢績效",desc:"本月巡檢完成率統計",Ic:I.Target,value:"87.5%",color:"text-blue-400"},{title:"客戶滿意度",desc:"服務評分 4.6 / 5.0",Ic:I.Star,value:"4.6",color:"text-red-400"}].map((r,i)=>(<div key={i} className="bg-white rounded-xl border border-gray-200 p-5 hover-lift cursor-pointer"><div className="flex items-center justify-between mb-3"><r.Ic size={20} className={r.color}/><span className={`text-xl font-bold ${r.color}`}>{r.value}</span></div><div className="text-sm font-semibold text-gray-800">{r.title}</div><div className="text-xs text-gray-500 mt-1">{r.desc}</div><button className="mt-3 text-xs text-blue-600 hover:text-blue-700 flex items-center gap-1">查看詳情 <I.ArrowUp size={12}/></button></div>))}</div></div>);

// ============ Main App ============
const MODS=[{id:"dashboard",label:"系統總覽",Ic:I.Home},{id:"gis",label:"3D GIS",Ic:I.Globe},{id:"assets",label:"資產管理",Ic:I.Database},{id:"patrol",label:"巡邏檢查",Ic:I.Clipboard},{id:"maintenance",label:"維護查修",Ic:I.Wrench},{id:"reports",label:"報表分析",Ic:I.BarChart}];

const App=()=>{
  const[mod,setMod]=useState("dashboard");
  const[mobileMenu,setMobileMenu]=useState(false);
  const isGIS=mod==="gis";

  const renderMod=()=>{switch(mod){case"dashboard":return<DashboardModule/>;case"gis":return<GISModule/>;case"assets":return<AssetModule/>;case"patrol":return<PatrolModule/>;case"maintenance":return<MaintenanceModule/>;case"reports":return<ReportsModule/>;default:return<DashboardModule/>;}};

  return(
    <div className="h-full flex flex-col bg-gray-50 overflow-hidden">
      <header className="bg-white border-b border-gray-200 px-4 flex items-center justify-between flex-shrink-0 z-30" style={{height:56}}>
        <div className="flex items-center gap-3">
          <button className="md:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-lg" onClick={()=>setMobileMenu(true)}><I.Menu size={20}/></button>
          <div className="flex items-center gap-2.5"><div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:"linear-gradient(135deg,#2563eb,#4338ca)"}}><I.Building size={16} className="text-white"/></div><div className="hidden sm:block"><span className="text-sm font-bold text-gray-900">PFMS</span><span className="text-xs text-gray-400 ml-1.5 hidden md:inline">物業與設施管理系統</span></div></div>
        </div>
        <nav className="hidden md:flex items-center gap-1">{MODS.map(m=>(<button key={m.id} onClick={()=>setMod(m.id)} className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition-colors ${mod===m.id?"bg-blue-50 text-blue-700 font-medium":"text-gray-500 hover:text-gray-700 hover:bg-gray-50"}`}><m.Ic size={15}/><span>{m.label}</span></button>))}</nav>
        <div className="flex items-center gap-2"><button className="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg"><I.Bell size={18}/><span className="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-xs font-bold flex items-center justify-center rounded-full" style={{fontSize:9}}>4</span></button><div className="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs font-bold text-gray-600">SJ</div></div>
      </header>
      {mobileMenu&&<div className="fixed inset-0 z-50"><div className="absolute inset-0 bg-black bg-opacity-40" onClick={()=>setMobileMenu(false)}/><div className="relative bg-white shadow-xl slide-in-left" style={{width:280,height:"100%"}}><div className="p-4 border-b border-gray-100 flex items-center justify-between"><span className="text-sm font-bold text-gray-900">PFMS</span><button onClick={()=>setMobileMenu(false)} className="text-gray-400"><I.X size={20}/></button></div><nav className="p-3 space-y-1">{MODS.map(m=>(<button key={m.id} onClick={()=>{setMod(m.id);setMobileMenu(false);}} className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-left ${mod===m.id?"bg-blue-50 text-blue-700 font-medium":"text-gray-600 hover:bg-gray-50"}`}><m.Ic size={18}/><span>{m.label}</span></button>))}</nav></div></div>}
      <main className="flex-1 overflow-auto" style={{background:isGIS?"#0a1628":undefined}}>{renderMod()}</main>
    </div>
  );
};

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
