// ============ Dynamic SDK Loader ============
function loadScript(src){
  return new Promise((resolve,reject)=>{
    if(document.querySelector('script[src="'+src+'"]')){resolve();return;}
    const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;document.head.appendChild(s);
  });
}
function loadCSS(href){
  if(document.querySelector('link[href="'+href+'"]'))return;
  const l=document.createElement('link');l.rel='stylesheet';l.href=href;document.head.appendChild(l);
}

const ThreeScene=({selectedAsset,onAssetClick,siteData,onLabelPositions})=>{
  const mountRef=useRef(null);
  const stateRef=useRef({});

  useEffect(()=>{
    if(!mountRef.current)return;
    const el=mountRef.current;
    const w=el.clientWidth||800;const h=el.clientHeight||600;
    const S=stateRef.current;

    const scene=new THREE.Scene();scene.background=new THREE.Color(0x0a1628);scene.fog=new THREE.FogExp2(0x0a1628,0.006);
    const camera=new THREE.PerspectiveCamera(55,w/h,0.1,1000);
    const renderer=new THREE.WebGLRenderer({antialias:true});
    renderer.setSize(w,h);renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));renderer.shadowMap.enabled=true;
    el.appendChild(renderer.domElement);

    S.spherical={theta:0,phi:Math.PI/4,radius:40};
    S.target=new THREE.Vector3(0,3,0);
    S.isDragging=false;S.prevMouse={x:0,y:0};S.autoRotate=true;

    // Lights
    scene.add(new THREE.AmbientLight(0x334466,0.6));
    var dl=new THREE.DirectionalLight(0xffeedd,1.0);dl.position.set(20,30,10);dl.castShadow=true;scene.add(dl);
    var pl1=new THREE.PointLight(0x3b82f6,1.5,60);pl1.position.set(-10,15,-10);scene.add(pl1);
    var pl2=new THREE.PointLight(0x06b6d4,1.0,50);pl2.position.set(15,10,15);scene.add(pl2);

    // Ground + Grid

    ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);

    // Building
    var bldg=new THREE.Mesh(new THREE.BoxGeometry(18,10,14),new THREE.MeshPhysicalMaterial({color:0x1e3a5f,metalness:0.3,roughness:0.6,clearcoat:0.2}));
    bldg.position.set(0,5,0);bldg.castShadow=true;scene.add(bldg);
    for(var fi=1;fi<=3;fi++){var fl=new THREE.Mesh(new THREE.BoxGeometry(18.1,0.05,14.1),new THREE.MeshBasicMaterial({color:0x3b82f6,transparent:true,opacity:0.4}));fl.position.set(0,fi*3,0);scene.add(fl);}
    var roofMat=new THREE.MeshPhysicalMaterial({color:0x334155,metalness:0.5,roughness:0.4});
    [-4,4].forEach(function(x){var ru=new THREE.Mesh(new THREE.BoxGeometry(4,2,3),roofMat);ru.position.set(x,11,0);ru.castShadow=true;scene.add(ru);});

    // Assets
    var allAssets=[];
    if(siteData&&siteData.floors)siteData.floors.forEach(function(f){if(f.zones)f.zones.forEach(function(z){if(z.assets)z.assets.forEach(function(a){allAssets.push(a);});});});
    var matActive=new THREE.MeshPhysicalMaterial({color:0x10b981,metalness:0.6,roughness:0.3,emissive:0x064e3b,emissiveIntensity:0.2});
    var matWarn=new THREE.MeshPhysicalMaterial({color:0xf59e0b,metalness:0.6,roughness:0.3,emissive:0x78350f,emissiveIntensity:0.3});
    var matMaint=new THREE.MeshPhysicalMaterial({color:0x6366f1,metalness:0.6,roughness:0.3,emissive:0x312e81,emissiveIntensity:0.2});
    var rackGeo=new THREE.BoxGeometry(1.2,3.5,0.8);
    var meshes=[];
    var positions=[[-5,2,-3],[-3,2,-3],[-1,2,-3],[1,2,-3],[3,2,-3],[5,2,-3],[-5,2,0],[-3,2,0],[-1,2,0],[1,2,0],[3,2,0],[5,2,0],[-5,2,3],[-3,2,3],[-1,2,3],[1,2,3],[3,2,3],[5,2,3],[-5,5.5,-3],[-3,5.5,-3],[-1,5.5,-3],[1,5.5,-3],[-5,5.5,0],[-3,5.5,0],[-1,5.5,0],[1,5.5,0]];
    positions.forEach(function(pos,i){
      var asset=allAssets[i%allAssets.length];
      var st=(asset&&asset.status)||"active";
      var mat=st==="warning"?matWarn:st==="maintenance"?matMaint:matActive;

    // LEDs
    var ledGeo=new THREE.SphereGeometry(0.08,8,8);
    meshes.forEach(function(rack){var c=rack.userData.status==="warning"?0xf59e0b:0x10b981;for(var j=0;j<3;j++){var led=new THREE.Mesh(ledGeo,new THREE.MeshBasicMaterial({color:c}));led.position.set(rack.position.x+0.65,rack.position.y+0.5+j*0.8,rack.position.z);scene.add(led);}});
    // Network lines
    var lineMat=new THREE.LineBasicMaterial({color:0x3b82f6,transparent:true,opacity:0.15});
    for(var li=0;li<meshes.length-1;li++){if(Math.random()>0.5){var pts=[meshes[li].position.clone(),meshes[li+1].position.clone()];pts[0].y+=2;pts[1].y+=2;scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts),lineMat));}}
    // Surrounding
    var sbMat=new THREE.MeshPhysicalMaterial({color:0x162d50,metalness:0.2,roughness:0.7});
    [[-18,2.5,-8],[20,2.5,5],[-15,2.5,12],[22,2.5,-10]].forEach(function(p){var sb=new THREE.Mesh(new THREE.BoxGeometry(6,5,5),sbMat);sb.position.set(p[0],p[1],p[2]);sb.castShadow=true;scene.add(sb);});
    // Particles
    var pCount=150;var pGeo=new THREE.BufferGeometry();var pPos=new Float32Array(pCount*3);
    for(var pi=0;pi<pCount;pi++){pPos[pi*3]=(Math.random()-0.5)*80;pPos[pi*3+1]=Math.random()*30+2;pPos[pi*3+2]=(Math.random()-0.5)*80;}
    pGeo.setAttribute("position",new THREE.BufferAttribute(pPos,3));
    var particles=new THREE.Points(pGeo,new THREE.PointsMaterial({color:0x3b82f6,size:0.15,transparent:true,opacity:0.4}));scene.add(particles);

    // Camera update
    var updateCamera=function(){
      camera.position.x=S.target.x+S.spherical.radius*Math.sin(S.spherical.phi)*Math.cos(S.spherical.theta);
      camera.position.y=S.target.y+S.spherical.radius*Math.cos(S.spherical.phi);
      camera.position.z=S.target.z+S.spherical.radius*Math.sin(S.spherical.phi)*Math.sin(S.spherical.theta);
      camera.lookAt(S.target);
    };
    updateCamera();

    // Mouse handlers
    var onMD=function(e){S.isDragging=true;S.prevMouse={x:e.clientX,y:e.clientY};S.autoRotate=false;};
    var onMM=function(e){if(!S.isDragging)return;var dx=e.clientX-S.prevMouse.x,dy=e.clientY-S.prevMouse.y;
      if(e.buttons===1){S.spherical.theta-=dx*0.005;S.spherical.phi=Math.max(0.2,Math.min(1.5,S.spherical.phi-dy*0.005));}
      else if(e.buttons===2||e.buttons===4){var right=new THREE.Vector3();var up=new THREE.Vector3();camera.getWorldDirection(up);right.crossVectors(up,camera.up).normalize();up.copy(camera.up).normalize();S.target.add(right.multiplyScalar(-dx*0.05));S.target.add(up.multiplyScalar(dy*0.05));}
      S.prevMouse={x:e.clientX,y:e.clientY};updateCamera();
    };
    var onMU=function(){S.isDragging=false;};
    var onWH=function(e){e.preventDefault();S.spherical.radius=Math.max(8,Math.min(80,S.spherical.radius+e.deltaY*0.04));S.autoRotate=false;updateCamera();};
    var onDC=function(e){
      var rect=el.getBoundingClientRect();var mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
      var ray=new THREE.Raycaster();ray.setFromCamera(mouse,camera);var hits=ray.intersectObjects(meshes);
      if(hits.length>0){var pt=hits[0].point;S.target.set(pt.x,pt.y,pt.z);S.spherical.radius=Math.max(8,S.spherical.radius*0.5);updateCamera();if(onAssetClick)onAssetClick(hits[0].object.userData);}
      else{S.spherical.radius=Math.max(8,S.spherical.radius*0.7);updateCamera();}
    };
    var onCK=function(e){
      var rect=el.getBoundingClientRect();var mouse=new THREE.Vector2(((e.clientX-rect.left)/rect.width)*2-1,-((e.clientY-rect.top)/rect.height)*2+1);
      var ray=new THREE.Raycaster();ray.setFromCamera(mouse,camera);var hits=ray.intersectObjects(meshes);
      if(hits.length>0&&onAssetClick)onAssetClick(hits[0].object.userData);
    };
    var onCM=function(e){e.preventDefault();};
    el.addEventListener("mousedown",onMD);el.addEventListener("mousemove",onMM);el.addEventListener("mouseup",onMU);
    el.addEventListener("wheel",onWH,{passive:false});el.addEventListener("dblclick",onDC);el.addEventListener("click",onCK);el.addEventListener("contextmenu",onCM);

    // Touch
    var touchDist=null;
    var onTS=function(e){if(e.touches.length===1){S.isDragging=true;S.prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};S.autoRotate=false;}if(e.touches.length===2){var dx2=e.touches[0].clientX-e.touches[1].clientX;var dy2=e.touches[0].clientY-e.touches[1].clientY;touchDist=Math.sqrt(dx2*dx2+dy2*dy2);}};
    var onTM=function(e){e.preventDefault();if(e.touches.length===1&&S.isDragging){var dx3=e.touches[0].clientX-S.prevMouse.x;var dy3=e.touches[0].clientY-S.prevMouse.y;S.spherical.theta-=dx3*0.005;S.spherical.phi=Math.max(0.2,Math.min(1.5,S.spherical.phi-dy3*0.005));S.prevMouse={x:e.touches[0].clientX,y:e.touches[0].clientY};updateCamera();}if(e.touches.length===2&&touchDist){var dx4=e.touches[0].clientX-e.touches[1].clientX;var dy4=e.touches[0].clientY-e.touches[1].clientY;var nd=Math.sqrt(dx4*dx4+dy4*dy4);S.spherical.radius=Math.max(8,Math.min(80,S.spherical.radius*(touchDist/nd)));touchDist=nd;updateCamera();}};
    var onTE=function(){S.isDragging=false;touchDist=null;};
    el.addEventListener("touchstart",onTS,{passive:false});el.addEventListener("touchmove",onTM,{passive:false});el.addEventListener("touchend",onTE);

    // Animate
    var t=0;var animId;
    var animate=function(){
      animId=requestAnimationFrame(animate);t+=0.01;
      if(S.autoRotate){S.spherical.theta+=0.002;updateCamera();}
      var pp=particles.geometry.attributes.position.array;for(var pi2=0;pi2<pCount;pi2++){pp[pi2*3+1]+=0.02;if(pp[pi2*3+1]>35)pp[pi2*3+1]=2;}particles.geometry.attributes.position.needsUpdate=true;
      meshes.forEach(function(m){m.scale.setScalar(selectedAsset&&m.userData.id===selectedAsset.id?1.0+0.1*Math.sin(t*4):1.0);});
      renderer.render(scene,camera);
      if(onLabelPositions){var curW=el.clientWidth||w;var curH=el.clientHeight||h;var labs=[];meshes.forEach(function(m){var pos2=m.position.clone();pos2.y+=2.2;var proj=pos2.project(camera);var lx=(proj.x*0.5+0.5)*curW;var ly=(-proj.y*0.5+0.5)*curH;if(proj.z<1)labs.push({id:m.userData.id,name:m.userData.name,status:m.userData.status,x:lx,y:ly,data:m.userData});});onLabelPositions(labs);}
    };
    animate();

    var onResize=function(){var nw=el.clientWidth;var nh=el.clientHeight;if(nw&&nh){camera.aspect=nw/nh;camera.updateProjectionMatrix();renderer.setSize(nw,nh);}};
    window.addEventListener("resize",onResize);

    return function(){
      cancelAnimationFrame(animId);
      el.removeEventListener("mousedown",onMD);el.removeEventListener("mousemove",onMM);el.removeEventListener("mouseup",onMU);
      el.removeEventListener("wheel",onWH);el.removeEventListener("dblclick",onDC);el.removeEventListener("click",onCK);el.removeEventListener("contextmenu",onCM);
      el.removeEventListener("touchstart",onTS);el.removeEventListener("touchmove",onTM);el.removeEventListener("touchend",onTE);
      window.removeEventListener("resize",onResize);
      try{if(renderer.domElement.parentNode)el.removeChild(renderer.domElement);renderer.dispose();}catch(ex){}
    };
  },[siteData]);
  return <div ref={mountRef} className="three-canvas" style={{width:"100%",height:"100%"}}/>;
};

// ============ Layer Tree ============
const LayerTree=({data,selectedId,onSelect,sq})=>{
  const[exp,setExp]=useState({s1:true,f2:true});
  const toggle=function(id){setExp(function(p){var n={};for(var k in p)n[k]=p[k];n[id]=!p[id];return n;});};
  const match=function(n){return !sq||n.toLowerCase().indexOf(sq.toLowerCase())>=0;};
  const renderA=function(a,depth){
    if(!match(a.name)&&!match(a.type||""))return null;
    return(<div key={a.id} onClick={function(){onSelect(a);}} className={"flex items-center gap-2 py-1.5 px-2 rounded cursor-pointer text-sm transition-all "+(selectedId===a.id?"bg-blue-900 bg-opacity-40 text-blue-300":"text-gray-400 hover:bg-white hover:bg-opacity-5 hover:text-gray-200")} style={{paddingLeft:(depth||4)*16}}>
      <Dot s={a.status}/><span className="truncate flex-1">{a.name}</span><span className="text-xs text-gray-600">{a.type}</span>
    </div>);
  };
  return(<div className="text-sm">{data.map(function(site){return(
    <div key={site.id}>
      <div onClick={function(){toggle(site.id);onSelect(site);}} className={"flex items-center gap-2 py-2 px-2 rounded cursor-pointer font-medium transition-all "+(selectedId===site.id?"bg-blue-900 bg-opacity-40 text-blue-300":"text-gray-200 hover:bg-white hover:bg-opacity-5")}>
        {exp[site.id]?<I.ChevDown size={14}/>:<I.ChevRight size={14}/>}<I.Building size={14} className="text-blue-400"/><span className="truncate flex-1">{site.name}</span>{site.alerts>0&&<Badge variant="danger">{site.alerts}</Badge>}
      </div>
      {exp[site.id]&&site.floors&&site.floors.map(function(fl){return(
        <div key={fl.id}>
          <div onClick={function(){toggle(fl.id);onSelect(fl);}} className={"flex items-center gap-2 py-1.5 px-2 rounded cursor-pointer transition-all "+(selectedId===fl.id?"bg-blue-900 bg-opacity-40 text-blue-300":"text-gray-300 hover:bg-white hover:bg-opacity-5")} style={{paddingLeft:24}}>
            {exp[fl.id]?<I.ChevDown size={12}/>:<I.ChevRight size={12}/>}<I.Layers size={12} className="text-blue-400"/><span className="truncate">{fl.name}</span>
          </div>
          {exp[fl.id]&&fl.zones&&fl.zones.map(function(z){return(
            <div key={z.id}>
              <div className="flex items-center gap-2 py-1 px-2 text-gray-500 text-xs" style={{paddingLeft:40}}><I.MapPin size={10}/><span>{z.name}</span></div>
              {z.assets&&z.assets.map(function(a){return(<React.Fragment key={a.id}>{renderA(a,4)}{a.subItems&&a.subItems.map(function(sub){return renderA(sub,5);})}</React.Fragment>);})}
            </div>
          );})}
        </div>
      );})}
    </div>
  );})}</div>);
};

// ============ GIS Search ============
const GISSearch=({sites,onSelect,onClose})=>{
  const[q,setQ]=useState("");
  const all=useMemo(function(){var items=[];sites.forEach(function(s){items.push({name:s.name,_t:"site",_p:s.name,status:s.status,id:s.id,type:s.type});if(s.floors)s.floors.forEach(function(f){items.push({name:f.name,_t:"floor",_p:s.name+" › "+f.name,id:f.id});if(f.zones)f.zones.forEach(function(z){if(z.assets)z.assets.forEach(function(a){items.push({name:a.name,_t:"asset",_p:s.name+" › "+f.name+" › "+z.name,status:a.status,id:a.id,type:a.type,model:a.model,assetData:a});});});});});return items;},[sites]);
  var results=q.length>0?all.filter(function(it){var ql=q.toLowerCase();return (it.name&&it.name.toLowerCase().indexOf(ql)>=0)||(it.type&&it.type.toLowerCase().indexOf(ql)>=0)||(it.model&&it.model.toLowerCase().indexOf(ql)>=0);}).slice(0,10):[];
  return(
    <div className="absolute top-4 left-4 right-4 z-20" style={{maxWidth:480}}>
      <div className="rounded-xl overflow-hidden shadow-2xl" style={{background:"rgba(15,23,42,0.95)",border:"1px solid rgba(71,85,105,0.4)"}}>
        <div className="flex items-center gap-3 px-4 py-3" style={{borderBottom:"1px solid rgba(71,85,105,0.3)"}}>
          <I.Search size={16} className="text-gray-400"/><input autoFocus value={q} onChange={function(e){setQ(e.target.value);}} placeholder="搜尋設備、位置、型號..." className="flex-1 bg-transparent text-white text-sm outline-none"/>
          <button onClick={onClose} className="text-gray-400 hover:text-white"><I.X size={16}/></button>
        </div>
        {results.length>0&&<div style={{maxHeight:280,overflowY:"auto"}}>{results.map(function(it,i){return(
          <button key={i} onClick={function(){onSelect(it);onClose();}} className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-white hover:bg-opacity-5 transition-colors text-left">

      <button onClick={function(){setScanning(true);setTimeout(function(){setScanning(false);setScanResult("CP-B1F-003 Rack-C08");},2000);}} disabled={scanning} className={"w-24 h-24 rounded-2xl flex flex-col items-center justify-center gap-1 flex-shrink-0 "+(scanning?"bg-white bg-opacity-30":"bg-white bg-opacity-20 hover:bg-opacity-30 cursor-pointer")}>{scanning?<I.Refresh size={28} className="spin"/>:<I.QrCode size={28}/>}<span className="text-xs">{scanning?"掃描中":"掃描"}</span></button></div></div>
    <div className="bg-white rounded-xl border border-gray-200 overflow-hidden"><div className="px-5 py-4 border-b border-gray-100"><h3 className="text-sm font-semibold text-gray-900">今日巡檢排程</h3></div>
      {PATROLS.map(function(p){return(<div key={p.id} onClick={function(){setDetail(p);}} className="px-5 py-4 flex items-center gap-4 hover:bg-gray-50 border-b border-gray-50 cursor-pointer"><div className={"w-10 h-10 rounded-xl flex items-center justify-center flex-shrink-0 "+(p.status==="completed"?"bg-green-50 text-green-600":p.status==="in-progress"?"bg-blue-50 text-blue-600":"bg-gray-50 text-gray-400")}>{p.status==="completed"?<I.Check size={18}/>:p.status==="in-progress"?<I.Play size={18}/>:<I.Clock size={18}/>}</div><div className="flex-1 min-w-0"><div className="text-sm font-medium text-gray-800">{p.name}</div><div className="text-xs text-gray-500 mt-0.5">{p.route} · {p.patrol}</div></div><div style={{width:80}}><div className="h-1.5 bg-gray-100 rounded-full overflow-hidden"><div className={"h-full rounded-full "+(p.status==="completed"?"bg-green-500":"bg-blue-500")} style={{width:((p.completed/p.checkpoints)*100)+"%"}}/></div></div><I.ChevRight size={14} className="text-gray-300"/></div>);})}
    </div>
    {detail&&<DetailModal title={detail.name} onClose={function(){setDetail(null);}}><div className="space-y-4"><div className="grid grid-cols-2 gap-4"><div><div className="text-xs text-gray-500 mb-1">路線</div><div className="text-sm">{detail.route}</div></div><div><div className="text-xs text-gray-500 mb-1">巡檢人員</div><div className="text-sm">{detail.patrol}</div></div><div><div className="text-xs text-gray-500 mb-1">時段</div><div className="text-sm">{detail.time}</div></div><div><div className="text-xs text-gray-500 mb-1">進度</div><div className="text-sm font-bold">{detail.completed}/{detail.checkpoints}</div></div></div>
      <div className="bg-gray-50 rounded-lg p-3"><div className="flex justify-between mb-1"><span className="text-xs text-gray-500">完成進度</span><span className="text-xs font-bold">{Math.round((detail.completed/detail.checkpoints)*100)}%</span></div><div className="h-2.5 bg-gray-200 rounded-full overflow-hidden"><div className={"h-full rounded-full "+(detail.status==="completed"?"bg-green-500":"bg-blue-500")} style={{width:((detail.completed/detail.checkpoints)*100)+"%"}}/></div></div>
      {detail.items.length>0&&<div><div className="text-xs text-gray-500 mb-2">檢查項目</div>{detail.items.map(function(it,i){return(<div key={i} className="flex items-center justify-between py-2 border-b border-gray-50"><span className="text-sm text-gray-700">{it.name}</span><div className="flex items-center gap-2"><span className="text-sm font-mono text-gray-600">{it.val}</span><Badge variant={it.result==="正常"?"success":"warning"}>{it.result}</Badge></div></div>);})}</div>}
    </div></DetailModal>}
  </div>);
};

// ============ Maintenance ============
const MaintenanceModule=()=>{const[detail,setDetail]=useState(null);var groups={pending:WO.filter(function(w){return w.status==="pending";}),"in-progress":WO.filter(function(w){return w.status==="in-progress";}),completed:WO.filter(function(w){return w.status==="completed";})};var prioC={urgent:"border-red-500",high:"border-yellow-500",normal:"border-blue-500",low:"border-gray-300"};
  return(<div className="p-4 md:p-6 space-y-6 max-w-screen-xl mx-auto fade-in"><div className="flex items-center justify-between"><div><h2 className="text-xl font-bold text-gray-900">維護查修</h2></div><button className="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg flex items-center gap-2"><I.Plus size={16}/> 新增工單</button></div>
    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">{[{key:"pending",label:"待處理",color:"text-yellow-600",bg:"bg-yellow-50"},{key:"in-progress",label:"處理中",color:"text-blue-600",bg:"bg-blue-50"},{key:"completed",label:"已完成",color:"text-green-600",bg:"bg-green-50"}].map(function(col){return(<div key={col.key} className="bg-gray-50 rounded-xl p-4"><div className="flex items-center gap-2 mb-4"><span className={"text-sm font-semibold "+col.color}>{col.label}</span><span className={"text-xs px-2 py-0.5 rounded-full "+col.bg+" "+col.color}>{(groups[col.key]&&groups[col.key].length)||0}</span></div><div className="space-y-3">{groups[col.key]&&groups[col.key].map(function(wo){return(<div key={wo.id} onClick={function(){setDetail(wo);}} className={"bg-white rounded-lg p-4 border-l-4 "+(prioC[wo.priority])+" shadow-sm hover-lift cursor-pointer"}><div className="text-sm font-medium text-gray-800 mb-1">{wo.title}</div><div className="text-xs text-gray-500 mb-2">{wo.number}</div><div className="flex items-center justify-between"><Badge variant={wo.priority==="urgent"?"danger":wo.priority==="high"?"warning":"default"}>{wo.priority}</Badge><span className="text-xs text-gray-400">{wo.assignee}</span></div></div>);})}</div></div>);})}</div>
    {detail&&<DetailModal title={detail.title} onClose={function(){setDetail(null);}}><div className="space-y-4"><div className="grid grid-cols-2 gap-4"><div><div className="text-xs text-gray-500 mb-1">工單編號</div><div className="text-sm font-mono font-bold">{detail.number}</div></div><div><div className="text-xs text-gray-500 mb-1">優先級</div><Badge variant={detail.priority==="urgent"?"danger":"warning"}>{detail.priority}</Badge></div><div><div className="text-xs text-gray-500 mb-1">指派</div><div className="text-sm">{detail.assignee}</div></div><div><div className="text-xs text-gray-500 mb-1">期限</div><div className="text-sm">{detail.due}</div></div></div>
      <div><div className="text-xs text-gray-500 mb-1">描述</div><div className="text-sm bg-gray-50 rounded-lg p-3">{detail.desc}</div></div>
      <div><div className="text-xs text-gray-500 mb-2">歷程</div>{detail.history.map(function(h,i){return(<div key={i} className="flex items-start gap-3 mb-1.5"><div className="w-10 text-xs text-gray-400 text-right flex-shrink-0">{h.time}</div><div className="w-2 h-2 rounded-full bg-blue-500 mt-1.5 flex-shrink-0"/><div className="text-sm">{h.action}</div></div>);})}</div></div></DetailModal>}
  </div>);
};

// ============ Asset ============
const AssetModule=()=>{const[view,setView]=useState("grid");const[sq,setSq]=useState("");
  var allA=[];SITES.forEach(function(s){if(s.floors)s.floors.forEach(function(f){if(f.zones)f.zones.forEach(function(z){if(z.assets)z.assets.forEach(function(a){allA.push({id:a.id,name:a.name,type:a.type,status:a.status,temp:a.temp,power:a.power,model:a.model,site:s.name,zone:z.name});});});});});
  var filtered=sq?allA.filter(function(a){var ql=sq.toLowerCase();return a.name.toLowerCase().indexOf(ql)>=0||a.type.toLowerCase().indexOf(ql)>=0||(a.model||"").toLowerCase().indexOf(ql)>=0;}):allA;
  return(<div className="p-4 md:p-6 space-y-6 max-w-screen-xl mx-auto fade-in"><div className="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3"><div><h2 className="text-xl font-bold text-gray-900">資產管理</h2></div><div className="flex items-center gap-2"><button className="px-3 py-2 bg-white border border-gray-200 text-gray-600 text-sm rounded-lg flex items-center gap-1.5"><I.Scan size={14}/> 掃描入庫</button><button className="px-3 py-2 bg-blue-600 text-white text-sm rounded-lg flex items-center gap-1.5"><I.Plus size={14}/> 新增資產</button></div></div>
    <div className="grid grid-cols-2 md:grid-cols-4 gap-3">{[{l:"資產總數",v:allA.length,Ico:I.Database,c:"text-blue-500"},{l:"正常運行",v:allA.filter(function(a){return a.status==="active";}).length,Ico:I.Check,c:"text-green-500"},{l:"維護中",v:allA.filter(function(a){return a.status==="maintenance";}).length,Ico:I.Wrench,c:"text-yellow-500"},{l:"異常",v:allA.filter(function(a){return a.status==="warning";}).length,Ico:I.Alert,c:"text-red-500"}].map(function(s,i){return(<div key={i} className="bg-white rounded-xl border border-gray-200 p-4 flex items-center gap-3"><s.Ico size={20} className={s.c}/><div><div className="text-xl font-bold text-gray-900">{s.v}</div><div className="text-xs text-gray-500">{s.l}</div></div></div>);})}</div>
    <div className="flex items-center gap-3"><div className="flex-1 relative"><I.Search size={16} className="absolute left-3 top-1/2 transform -translate-y-1/2 text-gray-400"/><input value={sq} onChange={function(e){setSq(e.target.value);}} placeholder="搜尋資產..." className="w-full bg-white border border-gray-200 rounded-lg pl-10 pr-4 py-2.5 text-sm outline-none focus:border-blue-400"/></div><div className="flex bg-white border border-gray-200 rounded-lg overflow-hidden"><button onClick={function(){setView("grid");}} className={"p-2.5 "+(view==="grid"?"bg-blue-50 text-blue-600":"text-gray-400")}><I.Grid size={16}/></button><button onClick={function(){setView("list");}} className={"p-2.5 "+(view==="list"?"bg-blue-50 text-blue-600":"text-gray-400")}><I.List size={16}/></button></div></div>
    {view==="grid"?<div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">{filtered.map(function(a){return(<div key={a.id} className="bg-white rounded-xl border border-gray-200 p-4 hover-lift cursor-pointer"><div className="flex items-center justify-between mb-3"><div className="flex items-center gap-2"><div className={"p-2 rounded-lg "+(a.status==="active"?"bg-green-50":"bg-yellow-50")}><I.Server size={16} className={a.status==="active"?"text-green-500":"text-yellow-500"}/></div><div><div className="text-sm font-semibold text-gray-800">{a.name}</div><div className="text-xs text-gray-400">{a.type}</div></div></div><Dot s={a.status}/></div>{a.model&&<div className="text-xs text-gray-500 mb-2">{a.model}</div>}<div className="flex items-center justify-between text-xs text-gray-400"><span>{a.site}</span><span>{a.zone}</span></div>{a.temp>0&&<div className="mt-3 flex items-center gap-4 text-xs"><span className="flex items-center gap-1"><I.Thermo size={12} className="text-blue-500"/>{a.temp}°C</span><span className="flex items-center gap-1"><I.Zap size={12} className="text-blue-500"/>{a.power}%</span></div>}</div>);})}</div>:
    <div className="bg-white rounded-xl border border-gray-200 overflow-x-auto"><table className="w-full"><thead className="bg-gray-50 text-xs text-gray-500"><tr><th className="px-4 py-3 text-left">名稱</th><th className="px-4 py-3 text-left hidden md:table-cell">類型</th><th className="px-4 py-3 text-left hidden lg:table-cell">型號</th><th className="px-4 py-3 text-left hidden sm:table-cell">位置</th><th className="px-4 py-3 text-left">狀態</th></tr></thead><tbody>{filtered.map(function(a){return(<tr key={a.id} className="hover:bg-gray-50 cursor-pointer border-b border-gray-50"><td className="px-4 py-3 text-sm font-medium text-gray-800">{a.name}</td><td className="px-4 py-3 text-sm text-gray-500 hidden md:table-cell">{a.type}</td><td className="px-4 py-3 text-xs text-gray-400 hidden lg:table-cell">{a.model}</td><td className="px-4 py-3 text-xs text-gray-400 hidden sm:table-cell">{a.zone}</td><td className="px-4 py-3"><Badge variant={a.status==="active"?"success":"warning"}>{a.status}</Badge></td></tr>);})}</tbody></table></div>}
  </div>);
};

// ============ Reports ============
const ReportsModule=()=>(<div className="p-4 md:p-6 space-y-6 max-w-screen-xl mx-auto fade-in"><div><h2 className="text-xl font-bold text-gray-900">報表分析</h2></div><div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">{[{t:"資產盤點報告",d:"準確率 98.7%",Ico:I.Clipboard,v:"98.7%",c:"text-green-500"},{t:"維護成本分析",d:"本月 NT$1,240,000",Ico:I.TrendUp,v:"NT$1.24M",c:"text-blue-500"},{t:"能源效率",d:"PUE 持續優化",Ico:I.Zap,v:"1.42",c:"text-yellow-500"},{t:"設備可靠性",d:"MTBF/MTTR 趨勢",Ico:I.Activity,v:"99.1%",c:"text-purple-500"},{t:"巡檢績效",d:"本月完成率",Ico:I.Target,v:"87.5%",c:"text-blue-400"},{t:"客戶滿意度",d:"服務評分",Ico:I.Star,v:"4.6",c:"text-red-400"}].map(function(r,i){return(<div key={i} className="bg-white rounded-xl border border-gray-200 p-5 hover-lift cursor-pointer"><div className="flex items-center justify-between mb-3"><r.Ico size={20} className={r.c}/><span className={"text-xl font-bold "+r.c}>{r.v}</span></div><div className="text-sm font-semibold text-gray-800">{r.t}</div><div className="text-xs text-gray-500 mt-1">{r.d}</div></div>);})}</div></div>);

// ============ Main App ============
const MODS=[{id:"dashboard",label:"系統總覽",Ico:I.Home},{id:"gis",label:"3D GIS",Ico:I.Globe},{id:"assets",label:"資產管理",Ico:I.Database},{id:"patrol",label:"巡邏檢查",Ico:I.Clipboard},{id:"maintenance",label:"維護查修",Ico:I.Wrench},{id:"reports",label:"報表分析",Ico:I.BarChart}];

const App=()=>{
  const[mod,setMod]=useState("dashboard");const[mm,setMM]=useState(false);var isGIS=mod==="gis";
  var renderMod=function(){switch(mod){case"dashboard":return React.createElement(DashboardModule);case"gis":return React.createElement(GISModule);case"assets":return React.createElement(AssetModule);case"patrol":return React.createElement(PatrolModule);case"maintenance":return React.createElement(MaintenanceModule);case"reports":return React.createElement(ReportsModule);default:return React.createElement(DashboardModule);}};
  return(
    <div className="h-full flex flex-col bg-gray-50 overflow-hidden">
      <header className="bg-white border-b border-gray-200 px-4 flex items-center justify-between flex-shrink-0 z-30" style={{height:56}}>
        <div className="flex items-center gap-3"><button className="md:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-lg" onClick={function(){setMM(true);}}><I.Menu size={20}/></button><div className="flex items-center gap-2.5"><div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:"linear-gradient(135deg,#2563eb,#4338ca)"}}><I.Building size={16} className="text-white"/></div><div className="hidden sm:block"><span className="text-sm font-bold text-gray-900">PFMS</span><span className="text-xs text-gray-400 ml-1.5 hidden md:inline">物業與設施管理系統</span></div></div></div>
        <nav className="hidden md:flex items-center gap-1">{MODS.map(function(m){return(<button key={m.id} onClick={function(){setMod(m.id);}} className={"flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition-colors "+(mod===m.id?"bg-blue-50 text-blue-700 font-medium":"text-gray-500 hover:text-gray-700 hover:bg-gray-50")}><m.Ico size={15}/><span>{m.label}</span></button>);})}</nav>
        <div className="flex items-center gap-2"><button className="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg"><I.Bell size={18}/><span className="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white flex items-center justify-center rounded-full" style={{fontSize:9}}>4</span></button><div className="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs font-bold text-gray-600">SJ</div></div>
      </header>
      {mm&&<div className="fixed inset-0 z-50"><div className="absolute inset-0 bg-black bg-opacity-40" onClick={function(){setMM(false);}}/><div className="relative bg-white shadow-xl slide-in-left" style={{width:280,height:"100%"}}><div className="p-4 border-b border-gray-100 flex items-center justify-between"><span className="text-sm font-bold text-gray-900">PFMS</span><button onClick={function(){setMM(false);}} className="text-gray-400"><I.X size={20}/></button></div><nav className="p-3 space-y-1">{MODS.map(function(m){return(<button key={m.id} onClick={function(){setMod(m.id);setMM(false);}} className={"w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm text-left "+(mod===m.id?"bg-blue-50 text-blue-700 font-medium":"text-gray-600 hover:bg-gray-50")}><m.Ico size={18}/><span>{m.label}</span></button>);})}</nav></div></div>}
      <main className="flex-1 overflow-auto" style={{background:isGIS?"#0a1628":undefined}}>{renderMod()}</main>
    </div>
  );
};

ReactDOM.render(React.createElement(App),document.getElementById("root"));
</script>
</body>
</html>
