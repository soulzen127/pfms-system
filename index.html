    const ThreeScene = ({ selectedAsset, onAssetClick, siteData }) => {
      const mountRef = useRef(null);
      const animRef = useRef(null);

      useEffect(() => {
        if (!mountRef.current) return;
        const el = mountRef.current;
        const w = el.clientWidth, h = el.clientHeight;

        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a1628);
        scene.fog = new THREE.FogExp2(0x0a1628, 0.008);

        const camera = new THREE.PerspectiveCamera(60, w/h, 0.1, 1000);
        camera.position.set(30, 25, 30);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(w, h);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        el.appendChild(renderer.domElement);

        // Lights
        scene.add(new THREE.AmbientLight(0x334466, 0.6));
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.0);
        dirLight.position.set(20, 30, 10); dirLight.castShadow = true;
        scene.add(dirLight);
        const pl1 = new THREE.PointLight(0x3b82f6, 1.5, 60); pl1.position.set(-10, 15, -10); scene.add(pl1);
        const pl2 = new THREE.PointLight(0x06b6d4, 1.0, 50); pl2.position.set(15, 10, 15); scene.add(pl2);

        // Ground + Grid
        const ground = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), new THREE.MeshStandardMaterial({ color:0x0d1f3c, roughness:0.9 }));
        ground.rotation.x = -Math.PI/2; ground.receiveShadow = true; scene.add(ground);
        const grid = new THREE.GridHelper(80, 40, 0x1e3a5f, 0x162d50); grid.position.y = 0.01; scene.add(grid);

        // Main building
        const bldgMat = new THREE.MeshPhysicalMaterial({ color:0x1e3a5f, metalness:0.3, roughness:0.6, clearcoat:0.2 });
        const bldg = new THREE.Mesh(new THREE.BoxGeometry(18, 10, 14), bldgMat);
        bldg.position.set(0, 5, 0); bldg.castShadow = true; scene.add(bldg);

        // Floor lines
        for (let i = 1; i <= 3; i++) {
          const fl = new THREE.Mesh(new THREE.BoxGeometry(18.1, 0.05, 14.1), new THREE.MeshBasicMaterial({ color:0x3b82f6, transparent:true, opacity:0.4 }));
          fl.position.set(0, i*3, 0); scene.add(fl);
        }

        // Roof units
        const roofMat = new THREE.MeshPhysicalMaterial({ color:0x334155, metalness:0.5, roughness:0.4 });
        [-4, 4].forEach(x => {
          const ru = new THREE.Mesh(new THREE.BoxGeometry(4, 2, 3), roofMat);
          ru.position.set(x, 11, 0); ru.castShadow = true; scene.add(ru);
        });

        // Collect assets
        const allAssets = [];
        if (siteData?.floors) siteData.floors.forEach(f => f.zones?.forEach(z => z.assets?.forEach(a => allAssets.push(a))));

        const mats = {
          active: new THREE.MeshPhysicalMaterial({ color:0x10b981, metalness:0.6, roughness:0.3, emissive:0x064e3b, emissiveIntensity:0.2 }),
          warning: new THREE.MeshPhysicalMaterial({ color:0xf59e0b, metalness:0.6, roughness:0.3, emissive:0x78350f, emissiveIntensity:0.3 }),
          maintenance: new THREE.MeshPhysicalMaterial({ color:0x6366f1, metalness:0.6, roughness:0.3, emissive:0x312e81, emissiveIntensity:0.2 }),
        };

        const rackGeo = new THREE.BoxGeometry(1.2, 3.5, 0.8);
        const meshes = [];
        const positions = [
          [-5,2,-3],[-3,2,-3],[-1,2,-3],[1,2,-3],[3,2,-3],[5,2,-3],
          [-5,2,0],[-3,2,0],[-1,2,0],[1,2,0],[3,2,0],[5,2,0],
          [-5,2,3],[-3,2,3],[-1,2,3],[1,2,3],[3,2,3],[5,2,3],
          [-5,5.5,-3],[-3,5.5,-3],[-1,5.5,-3],[1,5.5,-3],
          [-5,5.5,0],[-3,5.5,0],[-1,5.5,0],[1,5.5,0],
        ];

        positions.forEach((pos, i) => {
          const asset = allAssets[i % allAssets.length];
          const st = asset?.status || "active";
          const rack = new THREE.Mesh(rackGeo, mats[st] || mats.active);
          rack.position.set(...pos); rack.castShadow = true;
          rack.userData = { id:asset?.id||`r${i}`, name:asset?.name||`Rack-${i}`, type:"equipment", status:st, assetData:asset };
          scene.add(rack); meshes.push(rack);
        });

        // LED indicators
        const ledGeo = new THREE.SphereGeometry(0.08, 8, 8);
        meshes.forEach(rack => {
          const c = rack.userData.status === "warning" ? 0xf59e0b : 0x10b981;
          for (let j = 0; j < 3; j++) {
            const led = new THREE.Mesh(ledGeo, new THREE.MeshBasicMaterial({ color:c }));
            led.position.copy(rack.position);
            led.position.x += 0.65; led.position.y += 0.5 + j*0.8;
            scene.add(led);
          }
        });

        // Network lines
        const lineMat = new THREE.LineBasicMaterial({ color:0x3b82f6, transparent:true, opacity:0.15 });
        for (let i = 0; i < meshes.length-1; i++) {
          if (Math.random() > 0.5) {
            const pts = [meshes[i].position.clone(), meshes[i+1].position.clone()];
            pts[0].y += 2; pts[1].y += 2;
            scene.add(new THREE.Line(new THREE.BufferGeometry().setFromPoints(pts), lineMat));
          }
        }

        // Surrounding buildings
        const sbMat = new THREE.MeshPhysicalMaterial({ color:0x162d50, metalness:0.2, roughness:0.7 });
        [[-18,2.5,-8],[20,2.5,5],[-15,2.5,12],[22,2.5,-10]].forEach(pos => {
          const sb = new THREE.Mesh(new THREE.BoxGeometry(6, 5, 5), sbMat);
          sb.position.set(...pos); sb.castShadow = true; scene.add(sb);
        });

        // Particles
        const pCount = 200;
        const pGeo = new THREE.BufferGeometry();
        const pPos = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount; i++) { pPos[i*3] = (Math.random()-0.5)*80; pPos[i*3+1] = Math.random()*30+2; pPos[i*3+2] = (Math.random()-0.5)*80; }
        pGeo.setAttribute("position", new THREE.BufferAttribute(pPos, 3));
        const particles = new THREE.Points(pGeo, new THREE.PointsMaterial({ color:0x3b82f6, size:0.15, transparent:true, opacity:0.5 }));
        scene.add(particles);

        // Raycaster
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        const onClick = (e) => {
          const rect = el.getBoundingClientRect();
          mouse.x = ((e.clientX - rect.left)/rect.width)*2-1;
          mouse.y = -((e.clientY - rect.top)/rect.height)*2+1;
          raycaster.setFromCamera(mouse, camera);
          const hits = raycaster.intersectObjects(meshes);
          if (hits.length > 0) onAssetClick?.(hits[0].object.userData);
        };
        el.addEventListener("click", onClick);

        // Animate
        let t = 0;
        const animate = () => {
          animRef.current = requestAnimationFrame(animate);
          t += 0.01;
          camera.position.x = 30*Math.cos(t*0.15);
          camera.position.z = 30*Math.sin(t*0.15);
          camera.lookAt(0, 3, 0);

          const pp = particles.geometry.attributes.position.array;
          for (let i = 0; i < pCount; i++) { pp[i*3+1] += 0.02; if (pp[i*3+1] > 35) pp[i*3+1] = 2; }
          particles.geometry.attributes.position.needsUpdate = true;

          meshes.forEach(m => {
            m.scale.setScalar(selectedAsset && m.userData.id === selectedAsset.id ? 1.0+0.1*Math.sin(t*4) : 1.0);
          });

          renderer.render(scene, camera);
        };
        animate();

        const onResize = () => {
          const nw = el.clientWidth, nh = el.clientHeight;
          camera.aspect = nw/nh; camera.updateProjectionMatrix(); renderer.setSize(nw, nh);
        };
        window.addEventListener("resize", onResize);

        return () => {
          cancelAnimationFrame(animRef.current);
          el.removeEventListener("click", onClick);
          window.removeEventListener("resize", onResize);
          if (renderer.domElement.parentNode) el.removeChild(renderer.domElement);
          renderer.dispose();
        };
      }, [siteData]);

      return <div ref={mountRef} className="three-canvas" style={{width:"100%",height:"100%"}} />;
    };

    // ============================================================
    // Layer Tree
    // ============================================================
    const LayerTree = ({ data, selectedId, onSelect, searchQuery }) => {
      const [expanded, setExpanded] = useState({ s1:true, f2:true });
      const toggle = (id) => setExpanded(p => ({...p, [id]:!p[id]}));
      const match = (name) => !searchQuery || name.toLowerCase().includes(searchQuery.toLowerCase());

      const renderAsset = (asset, depth=4) => {
        if (!match(asset.name) && !match(asset.type||"")) return null;
        return (
          <div key={asset.id} onClick={() => onSelect(asset)}
            className={`flex items-center gap-2 py-1.5 px-2 rounded cursor-pointer text-sm transition-all ${selectedId===asset.id ? "bg-blue-900 bg-opacity-40 text-blue-300" : "text-gray-400 hover:bg-white hover:bg-opacity-5 hover:text-gray-200"}`}
            style={{paddingLeft:depth*16}}>
            <StatusDot status={asset.status} />
            <span className="truncate flex-1">{asset.name}</span>
            <span className="text-xs text-gray-600">{asset.type}</span>
          </div>
        );
      };

      return (
        <div className="text-sm">
          {data.map(site => (
            <div key={site.id}>
              <div onClick={() => { toggle(site.id); onSelect(site); }}
                className={`flex items-center gap-2 py-2 px-2 rounded cursor-pointer font-medium transition-all ${selectedId===site.id ? "bg-blue-900 bg-opacity-40 text-blue-300" : "text-gray-200 hover:bg-white hover:bg-opacity-5"}`}>
                {expanded[site.id] ? <Icons.ChevronDown size={14}/> : <Icons.ChevronRight size={14}/>}
                <Icons.Building2 size={14} className="text-blue-400"/>
                <span className="truncate flex-1">{site.name}</span>
                {site.alerts > 0 && <Badge variant="danger">{site.alerts}</Badge>}
              </div>
              {expanded[site.id] && site.floors?.map(floor => (
                <div key={floor.id}>
                  <div onClick={() => { toggle(floor.id); onSelect(floor); }}
                    className={`flex items-center gap-2 py-1.5 px-2 rounded cursor-pointer transition-all ${selectedId===floor.id ? "bg-blue-900 bg-opacity-40 text-blue-300" : "text-gray-300 hover:bg-white hover:bg-opacity-5"}`}
                    style={{paddingLeft:24}}>
                    {expanded[floor.id] ? <Icons.ChevronDown size={12}/> : <Icons.ChevronRight size={12}/>}
                    <Icons.Layers size={12} className="text-blue-400"/>
                    <span className="truncate">{floor.name}</span>
                  </div>
                  {expanded[floor.id] && floor.zones?.map(zone => (
                    <div key={zone.id}>
                      <div className="flex items-center gap-2 py-1 px-2 text-gray-500 text-xs" style={{paddingLeft:40}}>
                        <Icons.MapPin size={10} className="text-gray-600"/>
                        <span>{zone.name}</span>
                      </div>
                      {zone.assets?.map(a => (
                        <React.Fragment key={a.id}>
                          {renderAsset(a)}
                          {a.subItems?.map(sub => renderAsset(sub, 5))}
                        </React.Fragment>
                      ))}
                    </div>
                  ))}
                </div>
              ))}
            </div>
          ))}
        </div>
      );
    };

    // ============================================================
    // GIS Search Overlay
    // ============================================================
    const GISSearch = ({ sites, onSelect, onClose }) => {
      const [query, setQuery] = useState("");
      const allItems = useMemo(() => {
        const items = [];
        sites.forEach(s => {
          items.push({...s, _type:"site", _path:s.name});
          s.floors?.forEach(f => {
            items.push({...f, _type:"floor", _path:`${s.name} › ${f.name}`});
            f.zones?.forEach(z => {
              items.push({...z, _type:"zone", _path:`${s.name} › ${f.name} › ${z.name}`});
              z.assets?.forEach(a => {
                items.push({...a, _type:"asset", _path:`${s.name} › ${f.name} › ${z.name} › ${a.name}`});
                a.subItems?.forEach(sub => items.push({...sub, _type:"sub", _path:`... › ${a.name} › ${sub.name}`}));
              });
            });
          });
        });
        return items;
      }, [sites]);

      const results = query.length > 0 ? allItems.filter(it =>
        it.name?.toLowerCase().includes(query.toLowerCase()) ||
        it.type?.toLowerCase().includes(query.toLowerCase()) ||
        it.model?.toLowerCase().includes(query.toLowerCase()) ||
        it.address?.toLowerCase().includes(query.toLowerCase())
      ).slice(0, 10) : [];

      const typeIcons = { site:"Building2", floor:"Layers", zone:"MapPin", asset:"Server", sub:"Cpu" };

      return (
        <div className="absolute top-4 left-4 right-4 z-20" style={{maxWidth:480}}>
          <div className="rounded-xl overflow-hidden shadow-2xl" style={{background:"rgba(15,23,42,0.95)", backdropFilter:"blur(20px)", border:"1px solid rgba(71,85,105,0.4)"}}>
            <div className="flex items-center gap-3 px-4 py-3" style={{borderBottom:"1px solid rgba(71,85,105,0.3)"}}>
              <Icons.Search size={16} className="text-gray-400"/>
              <input autoFocus value={query} onChange={e => setQuery(e.target.value)} placeholder="搜尋設備、位置、資產編號..."
                className="flex-1 bg-transparent text-white text-sm outline-none" style={{caretColor:"#60a5fa"}}/>
              <button onClick={onClose} className="text-gray-400 hover:text-white"><Icons.X size={16}/></button>
            </div>
            {results.length > 0 && (
              <div style={{maxHeight:280, overflowY:"auto"}}>
                {results.map((item, i) => {
                  const IconComp = Icons[typeIcons[item._type]] || Icons.Box;
                  return (
                    <button key={i} onClick={() => { onSelect(item); onClose(); }}
                      className="w-full flex items-center gap-3 px-4 py-2.5 hover:bg-white hover:bg-opacity-5 transition-colors text-left">
                      <IconComp size={15} className="text-blue-400 flex-shrink-0"/>
                      <div className="min-w-0 flex-1">
                        <div className="text-sm text-white truncate">{item.name}</div>
                        <div className="text-xs text-gray-500 truncate">{item._path}</div>
                      </div>
                      {item.status && <StatusDot status={item.status}/>}
                    </button>
                  );
                })}
              </div>
            )}
            {query && results.length === 0 && <div className="px-4 py-6 text-center text-gray-500 text-sm">未找到相關結果</div>}
          </div>
        </div>
      );
    };

    // ============================================================

                    {p === "google" ? "Google" : p === "cesium" ? "Cesium" : "Mapbox"}
                  </button>
                ))}

            {/* Bottom info bar */}
            <div className="absolute bottom-4 left-4 z-10 flex items-center gap-2">

      };

      return (
        <div className="h-full flex flex-col bg-gray-50 overflow-hidden">
          {/* Header */}
          <header className="bg-white border-b border-gray-200 px-4 flex items-center justify-between flex-shrink-0 z-30" style={{height:56}}>
            <div className="flex items-center gap-3">
              <button className="md:hidden p-2 text-gray-500 hover:bg-gray-100 rounded-lg" onClick={() => setMobileMenuOpen(true)}><Icons.Menu size={20}/></button>
              <div className="flex items-center gap-2.5">
                <div className="w-8 h-8 rounded-lg flex items-center justify-center" style={{background:"linear-gradient(135deg,#2563eb,#4338ca)"}}>
                  <Icons.Building2 size={16} className="text-white"/>
                </div>
                <div className="hidden sm:block">
                  <span className="text-sm font-bold text-gray-900">PFMS</span>
                  <span className="text-xs text-gray-400 ml-1.5 hidden md:inline">物業與設施管理系統</span>
                </div>
              </div>
            </div>

            <nav className="hidden md:flex items-center gap-1">
              {MODULES.map(m => (
                <button key={m.id} onClick={() => setCurrentModule(m.id)}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-lg text-sm transition-colors ${currentModule===m.id ? "bg-blue-50 text-blue-700 font-medium":"text-gray-500 hover:text-gray-700 hover:bg-gray-50"}`}>
                  <m.IconC size={15}/><span>{m.label}</span>
                </button>
              ))}
            </nav>

            <div className="flex items-center gap-2">
              <button className="relative p-2 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg">
                <Icons.Bell size={18}/>
                <span className="absolute top-1 right-1 w-4 h-4 bg-red-500 text-white text-xs font-bold flex items-center justify-center rounded-full" style={{fontSize:9}}>4</span>
              </button>
              <div className="w-8 h-8 bg-gray-200 rounded-full flex items-center justify-center text-xs font-bold text-gray-600">SJ</div>
            </div>
          </header>

          {/* Mobile Menu */}
          {mobileMenuOpen && (
            <div className="fixed inset-0 z-50" style={{display:"flex"}}>
              <div className="absolute inset-0 bg-black bg-opacity-40" onClick={() => setMobileMenuOpen(false)}/>
              <div className="relative bg-white shadow-xl slide-in-left" style={{width:280}}>
                <div className="p-4 border-b border-gray-100 flex items-center justify-between">
                  <span className="text-sm font-bold text-gray-900">PFMS</span>
                  <button onClick={() => setMobileMenuOpen(false)} className="text-gray-400"><Icons.X size={20}/></button>
                </div>
                <nav className="p-3 space-y-1">
                  {MODULES.map(m => (
                    <button key={m.id} onClick={() => { setCurrentModule(m.id); setMobileMenuOpen(false); }}
                      className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-sm transition-colors text-left ${currentModule===m.id ? "bg-blue-50 text-blue-700 font-medium":"text-gray-600 hover:bg-gray-50"}`}>
                      <m.IconC size={18}/><span>{m.label}</span>
                    </button>
                  ))}
                </nav>
              </div>
            </div>
          )}

          {/* Main Content */}
          <main className="flex-1 overflow-auto" style={{background: isGIS ? "#0a1628" : undefined}}>
            {renderModule()}
          </main>
        </div>
      );
    };

    ReactDOM.render(<App/>, document.getElementById("root"));
    </script>
</body>
</html>
